    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Word generation: self-contained module -->
    <script>
        // ============================================================
        // WORD EXPORT — HTML-to-.doc  (sin librerías externas)
        // Word abre archivos .doc con contenido HTML perfectamente
        // ============================================================

        const MONTH_NAMES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio",
            "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

        async function saveWordDoc(htmlContent, filename) {
            const d = new Date();
            const wordDoc = `
<html xmlns:o='urn:schemas-microsoft-com:office:office'
      xmlns:w='urn:schemas-microsoft-com:office:word'
      xmlns='http://www.w3.org/TR/REC-html40'>
<head>
<meta charset='utf-8'>
<title>${filename}</title>
<!--[if gte mso 9]>
<xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom>
<w:DoNotOptimizeForBrowser/></w:WordDocument></xml>
<![endif]-->
<style>
  @page { margin: 2cm 2.5cm; }
  body { font-family: Calibri, Arial, sans-serif; font-size: 11pt; color: #000; }
  table { border-collapse: collapse; width: 100%; margin-bottom: 8pt; }
  td, th { border: 1pt solid #000; padding: 4pt 6pt; vertical-align: middle; }
  h1 { font-size: 14pt; color: #1F3864; font-weight: bold; margin: 0 0 6pt 0; }
  h2 { font-size: 11pt; color: #2E5496; font-weight: bold; margin: 0; }
  .header-logo { background: #1F3864; color: #fff; font-size: 14pt; font-weight: bold; text-align: center; }
  .header-title { background: #fff; color: #1F3864; font-size: 12pt; font-weight: bold; text-align: center; }
  .section-title { background: #2E5496; color: #fff; font-weight: bold; font-size: 11pt; }
  .content-cell { background: #fff; }
  ul { margin: 2pt 0; padding-left: 18pt; }
  li { margin-bottom: 2pt; font-size: 10pt; }
  .sig-header { background: #2E5496; color: #fff; font-weight: bold; text-align: center; font-size: 10pt; }
  .sig-space { height: 60pt; }
  .sig-label { text-align: center; font-size: 9pt; color: #555; }
  p { margin: 2pt 0; font-size: 10pt; }
</style>
</head>
<body>
${htmlContent}
</body>
</html>`;

            const blob = new Blob(['\ufeff', wordDoc], { type: 'application/msword;charset=utf-8' });

            // 1. SOLUCIÓN DEFINITIVA: Usar el API nativa de Guardado (File System Access API)
            // Esto abre un cuadro de diálogo "Guardar como..." real, ignorando las restricciones de Chrome.
            if (window.showSaveFilePicker) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: filename,
                        types: [{
                            description: 'Documento de Word',
                            accept: { 'application/msword': ['.doc'] }
                        }]
                    });
                    const writable = await handle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    return; // Éxito total
                } catch (err) {
                    if (err.name === 'AbortError') return; // El usuario canceló
                    console.warn("File System API falló, usando fallback...", err);
                }
            }

            // 2. FALLBACK: Data URI
            const base64 = btoa(unescape(encodeURIComponent('\ufeff' + wordDoc)));
            const url = 'data:application/msword;base64,' + base64;
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { document.body.removeChild(a); }, 300);
        }

        function buildMOFWordHTML(mof, areaName) {
            const d = new Date();
            const dateStr = `${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`;
            const safeText = t => String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

            const bullets = (arr) => arr.map(f => `<li>${safeText(f)}</li>`).join('');

            return `
<table>
  <tr>
    <td rowspan="3" width="22%" class="header-logo">
      BIASS<br>
      <span style="font-size:10pt;color:#FFD700;">CALL CENTER</span><br>
      <span style="font-size:9pt;color:#ccc;font-weight:normal;">FINANCIERO</span>
    </td>
    <td width="52%" class="header-title">MANUAL DE ORGANIZACIÓN Y FUNCIONES</td>
    <td width="26%"><b>Fecha:</b> ${dateStr}</td>
  </tr>
  <tr>
    <td><b>Puesto:</b> ${safeText(mof.titulo)}</td>
    <td><b>Código:</b> ___________</td>
  </tr>
  <tr>
    <td><b>Área:</b> ${safeText(areaName)}</td>
    <td><b>Versión:</b> 1.0</td>
  </tr>
</table>

<table>
  <tr><td class="section-title">1. OBJETIVO DEL PUESTO</td></tr>
  <tr><td class="content-cell"><p>${safeText(mof.objetivo)}</p></td></tr>
</table>

<table>
  <tr><td class="section-title">2. FUNCIONES PRINCIPALES</td></tr>
  <tr><td class="content-cell"><ul>${bullets(mof.funcionesPrincipales)}</ul></td></tr>
</table>

${mof.funcionesSecundarias && mof.funcionesSecundarias.length > 0 ? `
<table>
  <tr><td class="section-title">3. FUNCIONES SECUNDARIAS</td></tr>
  <tr><td class="content-cell"><ul>${bullets(mof.funcionesSecundarias)}</ul></td></tr>
</table>
` : ''}

<table>
  <tr><td class="section-title">4. REQUISITOS DEL PUESTO</td></tr>
  <tr><td class="content-cell">
    <p><b>Educación:</b> ${safeText(mof.requisitos.educacion)}</p>
    <p><b>Experiencia:</b> ${safeText(mof.requisitos.experiencia)}</p>
    <p><b>Conocimientos:</b></p>
    <ul>${bullets(mof.requisitos.conocimientos)}</ul>
  </td></tr>
</table>

<table>
  <tr><td class="section-title">5. COMPETENCIAS</td></tr>
  <tr><td class="content-cell"><ul>${mof.competencias.map(c =>
    `<li>${safeText(c.nombre)} <i>(${c.tipo === 'blanda' ? 'Competencia Blanda' : 'Competencia Técnica'})</i></li>`
  ).join('')}</ul></td></tr>
</table>

<table>
  <tr><td class="section-title">6. INDICADORES DE DESEMPEÑO (KPIs)</td></tr>
  <tr><td class="content-cell"><ul>${mof.kpis.map(k =>
    `<li><b>${safeText(k.nombre)}:</b> ${safeText(k.descripcion)}</li>`
  ).join('')}</ul></td></tr>
</table>

<table>
  <tr><td class="section-title">7. RELACIONES DE COORDINACIÓN</td></tr>
  <tr><td class="content-cell">
    <p><b>Internas:</b> ${safeText(mof.coordinaciones.internas)}</p>
    <p><b>Externas:</b> ${safeText(mof.coordinaciones.externas)}</p>
  </td></tr>
</table>

<table>
  <tr><td class="section-title">8. CONDICIONES DE TRABAJO</td></tr>
  <tr><td class="content-cell">
    <p><b>Horario:</b> ${safeText(mof.condiciones.horario)}</p>
    <p><b>Modalidad:</b> ${safeText(mof.condiciones.modalidad)}</p>
    <p><b>Herramientas:</b> ${safeText(mof.condiciones.herramientas)}</p>
  </td></tr>
</table>

<table>
  <tr>
    <td width="50%" class="sig-header">Recursos Humanos, Materiales y Servicios</td>
    <td width="50%" class="sig-header">Conformidad del Área</td>
  </tr>
  <tr>
    <td class="sig-space">&nbsp;</td>
    <td class="sig-space">&nbsp;</td>
  </tr>
  <tr>
    <td class="sig-label">Firma de Recursos Humanos</td>
    <td class="sig-label">Firma Responsable de Área</td>
  </tr>
</table>`;
        }

        window._exportToWordImpl = async function(mof, areaName) {
            const html = buildMOFWordHTML(mof, areaName);
            const safeName = mof.titulo.replace(/[\/\\?%*:|"<>]/g, '-');
            saveWordDoc(html, `MOF_${safeName}.doc`);
        };

        function buildWorkflowWordHTML(workflow) {
            const d = new Date();
            const dateStr = `${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`;
            const safeText = t => String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

            return `
<table>
  <tr>
    <td rowspan="3" width="22%" class="header-logo">
      BIASS<br>
      <span style="font-size:10pt;color:#FFD700;">CALL CENTER</span><br>
      <span style="font-size:9pt;color:#ccc;font-weight:normal;">FINANCIERO</span>
    </td>
    <td width="52%" class="header-title">FLUJO DE TRABAJO Y PROCESOS</td>
    <td width="26%"><b>Fecha:</b> ${dateStr}</td>
  </tr>
  <tr>
    <td colspan="2"><b>Proceso:</b> ${safeText(workflow.title)}</td>
  </tr>
  <tr>
    <td colspan="2"><b>Descripción:</b> ${safeText(workflow.description)}</td>
  </tr>
</table>

<table>
  <tr>
    <th class="section-title" width="10%">Paso</th>
    <th class="section-title" width="30%">Rol / Responsable</th>
    <th class="section-title" width="60%">Acción</th>
  </tr>
  ${workflow.steps.map((step, index) => `
  <tr>
    <td class="content-cell" style="text-align:center"><b>${index + 1}</b></td>
    <td class="content-cell">${safeText(step.roleName || step.roleId)}</td>
    <td class="content-cell">${safeText(step.action)}</td>
  </tr>`).join('')}
</table>
`;
        }

        window._exportWorkflowToWordImpl = async function(workflow) {
            const html = buildWorkflowWordHTML(workflow);
            const safeName = workflow.title.replace(/[\/\\?%*:|"<>]/g, '-');
            saveWordDoc(html, `Flujo_${safeName}.doc`);
        };

        window._exportStaffToWordImpl = async function(staffData, getMOFByIdFn, getAreaInfoFn) {
            const d = new Date();
            const dateStr = `${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`;
            const safeText = t => String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

            let rows = staffData.map(emp => {
                const mof = getMOFByIdFn(emp.puestoId);
                const area = mof ? getAreaInfoFn(mof.area) : { name: 'N/A' };
                const estado = emp.estado === 'activo' ? 'Activo' : emp.estado === 'vacaciones' ? 'Vacaciones' : 'Inactivo';
                return `<tr>
                    <td style="font-size:9pt">${safeText(emp.id)}</td>
                    <td><b>${safeText(emp.nombreCompleto)}</b></td>
                    <td>${mof ? safeText(mof.titulo) : safeText(emp.puestoId)}</td>
                    <td>${safeText(area.name)}</td>
                    <td style="font-size:9pt">${safeText(emp.tipoDoc)}</td>
                    <td style="text-align:center">${safeText(emp.numDoc)}</td>
                    <td style="text-align:center">${safeText(emp.fechaIngreso)}</td>
                    <td style="text-align:center">${safeText(estado)}</td>
                </tr>`;
            }).join('');

            const html = `
<table>
  <tr>
    <td rowspan="2" width="22%" class="header-logo">
      BIASS<br>
      <span style="font-size:10pt;color:#FFD700;">CALL CENTER</span><br>
      <span style="font-size:9pt;color:#ccc;font-weight:normal;">FINANCIERO</span>
    </td>
    <td width="52%" class="header-title">DIRECTORIO DE PERSONAL</td>
    <td width="26%"><b>Fecha:</b> ${dateStr}</td>
  </tr>
  <tr>
    <td colspan="2"><b>Total de Empleados:</b> ${staffData.length}</td>
  </tr>
</table>

<table>
  <tr>
    <th class="section-title" width="8%">ID</th>
    <th class="section-title" width="18%">Nombre Completo</th>
    <th class="section-title" width="16%">Puesto</th>
    <th class="section-title" width="14%">Área</th>
    <th class="section-title" width="12%">Tipo Doc</th>
    <th class="section-title" width="12%">N° Documento</th>
    <th class="section-title" width="10%">Ingreso</th>
    <th class="section-title" width="10%">Estado</th>
  </tr>
  ${rows}
</table>`;

            saveWordDoc(html, `Directorio_Personal_BIASS.doc`);
        };

        console.log('✅ Word export listo (HTML→.doc, sin dependencias externas)');
    </script>

</head>

            </div>
            <div class="mof-detail-actions">
                <button id="mof-export-pdf-btn" class="btn btn-primary" onclick="exportMOFToPDF()" style="background: #e11d48;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    Exportar PDF
                </button>
                <button id="mof-export-word-btn" class="btn btn-success">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    Exportar Word
                </button>
                <button id="mof-print-btn" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                    Imprimir MOF
                </button>
            </div>
        </div>
    </div>

    <!-- Print container (hidden, used for printing) -->
    
    <!-- Employee Form Modal Overlay -->
    <div id="employee-modal-overlay" class="mof-detail-overlay hidden">
        <div class="mof-detail-container" style="max-width: 500px; padding:24px;">
            <button class="mof-detail-close" onclick="document.getElementById('employee-modal-overlay').classList.add('hidden')">×</button>
            <h2 id="employee-modal-title" style="margin-bottom:20px; color:var(--text-primary);">Nuevo Empleado</h2>
            <form id="employee-form" style="display:flex; flex-direction:column; gap:16px;">
                <input type="hidden" id="emp-original-id">
                <div class="form-group" style="display:flex; flex-direction:column; gap:4px;">
                    <label for="emp-id" style="font-size:0.85rem; color:var(--text-secondary);">ID Empleado</label>
                    <input type="text" id="emp-id" required style="padding:8px 12px; border-radius:var(--radius-sm); border:1px solid var(--border-glass); background:var(--bg-glass); color:var(--text-primary);">
                </div>
                <div class="form-group" style="display:flex; flex-direction:column; gap:4px;">
                    <label for="emp-name" style="font-size:0.85rem; color:var(--text-secondary);">Nombre Completo</label>
                    <input type="text" id="emp-name" required style="padding:8px 12px; border-radius:var(--radius-sm); border:1px solid var(--border-glass); background:var(--bg-glass); color:var(--text-primary);">
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                    <div class="form-group" style="display:flex; flex-direction:column; gap:4px;">
                        <label for="emp-doc-type" style="font-size:0.85rem; color:var(--text-secondary);">Tipo Doc</label>
                        <select id="emp-doc-type" style="padding:8px; border-radius:var(--radius-sm); border:1px solid var(--border-glass); background:var(--bg-secondary); color:var(--text-primary);">
                            <option value="DNI">DNI</option>
                            <option value="CE">CE</option>
                        </select>
                    </div>
                    <div class="form-group" style="display:flex; flex-direction:column; gap:4px;">
                        <label for="emp-doc-num" style="font-size:0.85rem; color:var(--text-secondary);">N° Documento</label>
                        <input type="text" id="emp-doc-num" required style="padding:8px 12px; border-radius:var(--radius-sm); border:1px solid var(--border-glass); background:var(--bg-glass); color:var(--text-primary);">
                    </div>
                </div>
                <div class="form-group" style="display:flex; flex-direction:column; gap:4px;">
                    <label for="emp-role" style="font-size:0.85rem; color:var(--text-secondary);">Puesto (MOF)</label>
                    <select id="emp-role" required style="padding:8px; border-radius:var(--radius-sm); border:1px solid var(--border-glass); background:var(--bg-secondary); color:var(--text-primary);">
                        <!-- Injected via JS -->
                    </select>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                    <div class="form-group" style="display:flex; flex-direction:column; gap:4px;">
                        <label for="emp-date" style="font-size:0.85rem; color:var(--text-secondary);">Fecha Ingreso</label>
                        <input type="date" id="emp-date" required style="padding:8px 12px; border-radius:var(--radius-sm); border:1px solid var(--border-glass); background:var(--bg-glass); color:var(--text-primary); color-scheme:dark;">
                    </div>
                    <div class="form-group" style="display:flex; flex-direction:column; gap:4px;">
                        <label for="emp-status" style="font-size:0.85rem; color:var(--text-secondary);">Estado</label>
                        <select id="emp-status" style="padding:8px; border-radius:var(--radius-sm); border:1px solid var(--border-glass); background:var(--bg-secondary); color:var(--text-primary);">
                            <option value="activo">Activo</option>
                            <option value="vacaciones">Vacaciones</option>
                            <option value="inactivo">Inactivo</option>
                        </select>
                    </div>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:16px;">
                    <button type="button" class="btn" style="background:var(--bg-glass);" onclick="document.getElementById('employee-modal-overlay').classList.add('hidden')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
    <script src="app.js?v=9"></script>
</body>
</html>
